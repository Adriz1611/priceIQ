services:
  postgres:
    image: postgres:16-alpine
    container_name: priceiq-db
    ports:
      - "${POSTGRES_PORT:-54321}:5432"
    environment:
      POSTGRES_USER: aggregator
      POSTGRES_PASSWORD: aggregator
      POSTGRES_DB: aggregator
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aggregator"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app:
    build:
      context: .
      args:
        GROQ_API_KEY: "${GROQ_API_KEY}"
    container_name: priceiq-app
    ports:
      - "${APP_PORT:-3300}:3000"
    environment:
      DATABASE_URL: "postgresql://aggregator:aggregator@postgres:5432/aggregator"
      GROQ_API_KEY: "${GROQ_API_KEY}"
      SCRAPE_SECRET: "${SCRAPE_SECRET:-changeme}"
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
